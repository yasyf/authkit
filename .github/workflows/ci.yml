name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# One job, not a matrix: everything needs the same macOS runner, and macOS
# minutes bill 10x. macos-26 is pinned (not macos-latest) because the image
# ships Xcode 26.x — the Swift 6.2 toolchain this package's tools-version needs.
jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v5
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-
      - name: Install lint tools missing from the image
        # macos-26 ships swiftformat but not swiftlint; guard both against image churn.
        run: |
          command -v swiftformat >/dev/null || brew install swiftformat
          command -v swiftlint >/dev/null || brew install swiftlint
      - name: Format (lint mode)
        run: swiftformat --lint .
      - name: Lint
        run: swiftlint --quiet
      - name: Verify the exact release contract
        run: |
          set -euo pipefail
          workflow=.github/workflows/release.yml
          grep -Fq 'sign-notarize-app@19c3d5013032ad9c88f9a8f1170d1f366c19b8d9' "$workflow"
          grep -Fq 'stage-draft-release@e4c3108e693681df1a3c666bae80e890bc44cf3e' "$workflow"
          grep -Fq 'actions/publish@9ca67392d45d66b6ae01e262383c8f3138d56f5e' "$workflow"
          grep -Fq 'publish-draft-release@54e3e194bda69896894a82c17fcdb2822beefab5' "$workflow"
          if grep -Eq 'yasyf/homebrew-tap/.+@(v[0-9]+|main)|softprops/action-gh-release|release-notes:' "$workflow"; then
            echo "::error::release workflow contains a mutable or publishing compatibility path"
            exit 1
          fi
          stage="$(grep -n 'stage-draft-release@' "$workflow" | cut -d: -f1)"
          tap="$(grep -n 'name: Publish the cask to the tap' "$workflow" | cut -d: -f1)"
          publish="$(grep -n 'publish-draft-release@' "$workflow" | cut -d: -f1)"
          test "$stage" -lt "$tap"
          test "$tap" -lt "$publish"
      - name: Build
        run: swift build
      - name: Test
        run: swift test
